<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>P-Gates: PPP Route Auditor</title><link rel="stylesheet" href="/static/styles.css"></head>
<body><main><header><p class="eyebrow">P-Gates · PPP Route Auditor</p><h1>Keep the route readable.</h1><p class="intro">Separate what a report observes, infers, authorizes, burdens, and says to people.</p><p class="mode">● Mock mode — deterministic demo analysis; no API key or external model is used.</p></header>
<section class="input-panel"><label for="source">Paste an AI-generated report, recommendation, decision chain, or handoff.</label><textarea id="source" rows="12" placeholder="Paste text to review..."></textarea><label for="provider">Analysis provider</label><select id="provider"><option value="mock" selected>Mock mode (no API request)</option><option value="openai">OpenAI live mode</option></select><div class="actions"><button id="load-example" class="secondary">Load facial-recognition example</button><button id="analyze">Analyze Route</button></div></section><p id="status" role="status"></p>
<section id="results" hidden><div class="panel-grid"><article id="pal" class="result-panel"><h2>PAL</h2></article><article id="pecan" class="result-panel"><h2>PECAN</h2></article><article id="pea" class="result-panel"><h2>PEA</h2></article><article id="seed" class="result-panel"><h2>SEED</h2></article></div><article class="trace-panel"><h2>Phrase-level trace</h2><div id="trace"></div></article><div class="actions"><button id="export-json" class="secondary">Export JSON</button><button id="export-markdown" class="secondary">Export Markdown</button></div><p id="disclaimer" class="disclaimer"></p></section></main><script src="/static/app.js"></script></body></html>
